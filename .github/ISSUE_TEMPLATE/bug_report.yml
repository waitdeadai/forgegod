name: Bug Report
description: Report a bug in ForgeGod
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `forgegod run "..."`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"
  - type: dropdown
    id: provider
    attributes:
      label: Model provider
      options:
        - OpenAI
        - Ollama
        - Anthropic
        - OpenRouter
        - Multiple
