<svg xmlns="http://www.w3.org/2000/svg" width="820" height="680" viewBox="0 0 820 680">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .bg { fill: #0a0a0f; }
      .chrome { fill: #1a1a2e; }
      .border { fill: #2a2a3e; }
      .r { fill: #ff5f57; }
      .y { fill: #febc2e; }
      .g { fill: #28c840; }
      .t { fill: #888; font-size: 12px; }
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 14px; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="border" width="820" height="680" rx="10"/>
  <rect class="chrome" x="1" y="1" width="818" height="36" rx="10"/>
  <rect class="bg" x="1" y="37" width="818" height="642" rx="0"/>
  <rect class="bg" x="1" y="668" width="818" height="11" rx="10"/>
  <circle class="r" cx="22" cy="19" r="6"/>
  <circle class="y" cx="42" cy="19" r="6"/>
  <circle class="g" cx="62" cy="19" r="6"/>
  <text class="t" x="410" y="23" text-anchor="middle" fill="#888">forgegod - ~/myproject</text>

  <!-- Command -->
  <text x="20" y="66" fill="#28c840">&#x276F; <tspan fill="#e0e0e0">forgegod init</tspan></text>

  <!-- Mascot -->
  <text x="250" y="88" fill="#febc2e" text-anchor="middle">.</text>
  <text x="250" y="106" fill="#febc2e" text-anchor="middle">.-==========-.</text>
  <text x="250" y="124" fill="#febc2e" text-anchor="middle">.-'&#xA0;&#xA0;&#xA0;.-====-.&#xA0;&#xA0;&#xA0;'-. </text>
  <text x="250" y="142" fill="#febc2e" text-anchor="middle">\________/</text>
  <text x="250" y="160" fill="#00e5ff" text-anchor="middle">/\</text>
  <text x="250" y="178" fill="#00e5ff" text-anchor="middle">/&#xA0;/\&#xA0;\</text>
  <text x="250" y="196" fill="#00e5ff" text-anchor="middle">/&#xA0;/&#xA0;&#xA0;\&#xA0;\</text>
  <text x="250" y="214" text-anchor="middle"><tspan fill="#00e5ff">/&#xA0;/(_</tspan><tspan fill="#fff" font-weight="700">1</tspan><tspan fill="#00e5ff">_)\&#xA0;\</tspan></text>
  <text x="250" y="232" fill="#00e5ff" text-anchor="middle">/_/_______\_\</text>

  <!-- Branding -->
  <text x="250" y="260" text-anchor="middle"><tspan fill="#00e5ff" font-weight="700">F O R G E G O D</tspan><tspan fill="#666">&#xA0;&#xA0;v0.1.0</tspan></text>
  <text x="250" y="278" fill="#666" text-anchor="middle">Autonomous coding engine</text>

  <!-- Init output -->
  <text x="20" y="308" fill="#e0e0e0" font-weight="700">Initializing project...</text>

  <text x="20" y="338"><tspan fill="#28c840">&#xA0;&#xA0;+&#xA0;</tspan><tspan fill="#e0e0e0">OpenAI API key detected</tspan></text>
  <text x="20" y="356"><tspan fill="#28c840">&#xA0;&#xA0;+&#xA0;</tspan><tspan fill="#e0e0e0">Anthropic API key detected</tspan></text>
  <text x="20" y="374"><tspan fill="#28c840">&#xA0;&#xA0;+&#xA0;</tspan><tspan fill="#e0e0e0">Ollama running (4 models)</tspan></text>
  <text x="20" y="392" fill="#555">&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;qwen3-coder-next</text>
  <text x="20" y="410" fill="#555">&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;devstral</text>
  <text x="20" y="428" fill="#555">&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;codestral</text>
  <text x="20" y="446" fill="#555">&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;llama3.3</text>
  <text x="20" y="464"><tspan fill="#28c840">&#xA0;&#xA0;+&#xA0;</tspan><tspan fill="#e0e0e0">Detected: python</tspan></text>
  <text x="20" y="482" fill="#e0e0e0">&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;Test runner: pytest</text>
  <text x="20" y="500"><tspan fill="#28c840">&#xA0;&#xA0;+&#xA0;</tspan><tspan fill="#e0e0e0">Git repository</tspan></text>

  <text x="20" y="530" fill="#28c840" font-weight="700">Initialized at ~/myproject/.forgegod</text>

  <text x="20" y="560" fill="#e0e0e0" font-weight="700">Quick start:</text>
  <text x="20" y="578" fill="#e0e0e0">&#xA0;&#xA0;forgegod run "Add a /health endpoint with uptime info"</text>

  <text x="20" y="608" fill="#666">Config: .forgegod/config.toml | Memory: .forgegod/memory.db</text>
  <text x="20" y="626" fill="#666">Running in hybrid mode: Ollama (free) + OpenAI (quality gate)</text>

  <!-- Cursor -->
  <text x="20" y="654" fill="#28c840">&#x276F; <tspan fill="#666">&#x2588;</tspan></text>
</svg>
